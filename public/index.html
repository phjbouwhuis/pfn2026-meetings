<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PFN2026 — 1-on-1 Meeting Scheduler</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='15' fill='%23003154'/><path d='M16 1C22 1 28 7 28 16C28 25 22 31 16 31' fill='%23ff4500'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--orange:#ff4500;--orange-light:#ff6a33;--orange-glow:rgba(255,69,0,0.15);--blue:#003154;--blue-light:#004a7c;--blue-dark:#00243d;--bg:#f0f2f5;--card:#fff;--border:#e5e7eb;--text:#1a1a2e;--success:#22c55e;--danger:#ef4444;--warning:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideIn{from{transform:translateX(120px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120px);opacity:0}}
@keyframes scaleIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .5s ease-out both}.fade-up-1{animation-delay:.05s}.fade-up-2{animation-delay:.1s}.fade-up-3{animation-delay:.15s}
.scale-in{animation:scaleIn .35s ease-out both}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:0 0}::-webkit-scrollbar-thumb{background:rgba(0,49,84,.2);border-radius:3px}
input,select{font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 16px;border:2px solid var(--border);border-radius:10px;width:100%;transition:all .2s;background:#fff;color:var(--text)}
input:focus,select:focus{outline:0;border-color:var(--orange);box-shadow:0 0 0 4px var(--orange-glow)}
input::placeholder{color:#aaa}
.btn{font-family:'DM Sans',sans-serif;font-weight:600;border:none;border-radius:10px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;line-height:1}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn-primary{background:var(--orange);color:#fff;padding:14px 28px;font-size:14px;box-shadow:0 4px 15px rgba(255,69,0,.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(255,69,0,.4);background:var(--orange-light)}
.btn-blue{background:var(--blue);color:#fff;padding:14px 28px;font-size:14px;box-shadow:0 4px 15px rgba(0,49,84,.3)}
.btn-blue:hover{background:var(--blue-light)}
.btn-secondary{background:#fff;color:var(--blue);border:2px solid var(--border);padding:12px 24px;font-size:13px}
.btn-secondary:hover{border-color:var(--blue)}
.btn-ghost{background:0 0;color:rgba(255,255,255,.5);padding:8px 16px;font-size:11px}
.btn-ghost:hover{color:rgba(255,255,255,.8)}
.btn-danger-outline{background:0 0;border:2px solid #fecaca;color:var(--danger);padding:8px 16px;font-size:12px;font-weight:600}
.btn-danger-outline:hover{background:#fef2f2}
.btn-back{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:7px 16px;font-size:13px}
.btn-back:hover{background:rgba(255,255,255,.18)}
.btn-sm{padding:8px 14px;font-size:12px}
.card{background:var(--card);border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:28px}
.card-prominent{box-shadow:0 20px 60px rgba(0,0,0,.25)}
.app-header{background:linear-gradient(135deg,var(--blue) 0%,var(--blue-dark) 100%);padding:0 28px;height:66px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(0,0,0,.2);position:sticky;top:0;z-index:100}
#toast-container{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:10px;max-width:400px;width:calc(100% - 32px)}
.toast{background:#fff;border-radius:10px;padding:14px 18px;box-shadow:0 10px 40px rgba(0,0,0,.15);animation:slideIn .35s ease-out both;position:relative;border-left:4px solid var(--orange)}
.toast.confirmed{border-left-color:var(--success)}.toast.cancelled{border-left-color:var(--danger)}.toast.error{border-left-color:var(--danger)}
.toast-type{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;color:var(--orange)}
.toast.confirmed .toast-type{color:var(--success)}.toast.cancelled .toast-type{color:var(--danger)}.toast.error .toast-type{color:var(--danger)}
.toast-message{font-size:13px;color:var(--blue);line-height:1.45}.toast-email{font-size:11px;color:#999;margin-top:6px}
.toast-close{position:absolute;top:6px;right:10px;background:0 0;border:none;font-size:15px;cursor:pointer;color:#bbb;line-height:1}
.toast.removing{animation:slideOut .3s ease-in both}
.member-item{background:#fff;border:2px solid var(--border);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:all .18s;text-align:left;width:100%}
.member-item:hover{border-color:var(--orange);background:#fff8f5}
.member-item.selected{border-color:var(--orange);background:rgba(255,69,0,.06)}
.member-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--blue-light));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.member-item.selected .member-avatar{background:var(--orange)}
.member-name{font-weight:600;font-size:13px;color:var(--blue)}.member-company{font-size:11px;color:#888}
.member-country{font-size:10px;color:#999;background:#f0f0f0;border-radius:10px;padding:2px 8px;flex-shrink:0}
.slot-btn{border:2px solid var(--success);background:#f0fdf4;border-radius:10px;padding:12px 14px;text-align:left;cursor:pointer;transition:all .18s;width:100%}
.slot-btn:hover:not(.disabled){transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
.slot-btn.disabled{opacity:.65;cursor:not-allowed}
.slot-btn.booked-together{border-color:var(--orange);background:rgba(255,69,0,.08)}
.slot-btn.my-busy{border-color:var(--danger);background:#fef2f2}
.slot-btn.their-busy{border-color:var(--warning);background:#fffbeb}
.slot-time{font-size:14px;font-weight:700;color:var(--blue)}
.slot-btn.booked-together .slot-time{color:var(--orange)}.slot-btn.my-busy .slot-time{color:var(--danger)}.slot-btn.their-busy .slot-time{color:#92400e}
.slot-status{font-size:11px;opacity:.7;margin-top:2px}
.meeting-card{background:#fff;border-radius:14px;padding:18px 22px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-left:5px solid var(--orange);display:flex;align-items:center;gap:16px}
.meeting-time-badge{background:linear-gradient(135deg,var(--blue),var(--blue-light));border-radius:10px;padding:10px 14px;text-align:center;min-width:105px;flex-shrink:0}
.meeting-time-start{font-size:16px;font-weight:800;color:#fff}.meeting-time-end{font-size:10px;color:rgba(255,255,255,.6)}
.meeting-partner{font-size:15px;font-weight:700;color:var(--blue)}.meeting-partner-company{font-size:12px;color:#888}
.meeting-status{display:inline-block;margin-top:6px;font-size:10px;font-weight:700;background:#dcfce7;color:#166534;padding:2px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.5px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
.pin-dots{display:flex;gap:8px;justify-content:center;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:#fff;transition:all .2s}
.pin-dot.filled{background:var(--orange);border-color:var(--orange)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:240px;margin:0 auto}
.pin-key{background:#f8f9fa;border:2px solid var(--border);border-radius:10px;padding:14px;font-size:20px;font-weight:700;color:var(--blue);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.pin-key:hover{background:#e5e7eb}.pin-key:active{transform:scale(.95)}
.pin-key.del{font-size:14px;color:#999}.pin-key.empty{visibility:hidden;cursor:default}
.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:10px 12px;background:#f8f9fa;color:var(--blue);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--border)}
.admin-table td{padding:10px 12px;border-bottom:1px solid #f0f0f0;color:var(--text)}
.admin-table tr:hover td{background:#fafafa}
@media (max-width:768px){.schedule-grid{grid-template-columns:1fr!important}.stats-grid{grid-template-columns:1fr!important}.action-grid{grid-template-columns:1fr!important}.slots-grid{grid-template-columns:1fr!important}.meeting-card{flex-direction:column;align-items:flex-start}.meeting-time-badge{min-width:auto;width:100%}.app-header{padding:0 16px}.header-user-info{display:none}.admin-table{font-size:11px}.admin-table th,.admin-table td{padding:6px 8px}}
@media (max-width:480px){.card{padding:20px}.page-container{padding:20px 12px!important}}
</style>
</head>
<body>
<div id="toast-container"></div>
<div id="app"></div>
<script>
const ORANGE='#ff4500',BLUE='#003154',CONF_DATE='Monday, June 16th 2026';

// ══════════════════════════════════════════════════════════════
// ADMIN PASSWORD (SHA-256 hashed)
// To change the admin password: open browser console on this page and run:
//   hashPassword('YourNewPassword').then(h => console.log(h))
// Then replace the hash below with the output.
// ══════════════════════════════════════════════════════════════
const ADMIN_PASSWORD_HASH = '5760b86b09271c3fd0e72abd8d89f6cda32c450b5364b48e85628118f6ae2cca';

async function hashPassword(pw){
  const enc=new TextEncoder().encode(pw);
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── Time Slots ────────────────────────────────────────────────
const TIME_SLOTS=[];
(function(){let h=10,m=0;while(h<16){if(h===12&&m>=30){h=13;m=15}if(h>=16)break;const eM=m+20,eH=h+Math.floor(eM/60),eR=eM%60;if(eH>16||(eH===16&&eR>0))break;if(h===12&&m+20>30){h=13;m=15;continue}const f=(a,b)=>String(a).padStart(2,'0')+':'+String(b).padStart(2,'0');TIME_SLOTS.push({start:f(h,m),end:f(eH,eR),label:f(h,m)+' – '+f(eH,eR)});m+=30;if(m>=60){h++;m-=60}}})();

// ── State ─────────────────────────────────────────────────────
let state={view:'login',members:[],meetings:[],currentUser:null,selectedMember:null,searchQuery:'',emailConfig:null,pinInput:'',pinTarget:null,adminAuth:false};

// ── Storage — Server-side via API, localStorage only for session ──
const API = '/api/data';
async function loadAll(){
  try{
    const res=await fetch(API+'?action=load');
    const data=await res.json();
    state.members=Array.isArray(data.members)?data.members:[];
    state.meetings=Array.isArray(data.meetings)?data.meetings:[];
    state.emailConfig=data.emailConfig||null;
  }catch(e){
    console.error('Load failed:',e);
    state.members=[];state.meetings=[];state.emailConfig=null;
  }
  // Current user session stays in localStorage (per-browser)
  try{state.currentUser=JSON.parse(localStorage.getItem('pfn26_user'))}catch(e){}
  if(state.currentUser){
    // Verify user still exists in members list
    const still=state.members.find(m=>m.id===state.currentUser.id);
    if(still){state.currentUser=still;state.view='dashboard'}
    else{state.currentUser=null;localStorage.removeItem('pfn26_user')}
  }else{state.currentUser=null}
  if(state.emailConfig&&state.emailConfig.publicKey){try{emailjs.init(state.emailConfig.publicKey)}catch(e){}}
}
function saveMembers(){fetch(API+'?action=save-members',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({members:state.members})})}
function saveMeetings(){fetch(API+'?action=save-meetings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({meetings:state.meetings})})}
function saveUser(){if(state.currentUser)localStorage.setItem('pfn26_user',JSON.stringify(state.currentUser));else localStorage.removeItem('pfn26_user')}
function saveEmail(){fetch(API+'?action=save-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({emailConfig:state.emailConfig})})}

// ── Helpers ───────────────────────────────────────────────────
function initials(n){return n.split(' ').map(x=>x[0]).join('').toUpperCase()}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

// ── Email ─────────────────────────────────────────────────────
async function sendMail(toEmail,toName,subject,body){
  if(!state.emailConfig||!state.emailConfig.serviceId)return{ok:false,why:'not_configured'};
  try{await emailjs.send(state.emailConfig.serviceId,state.emailConfig.templateId,{to_email:toEmail,to_name:toName,subject,message:body,conference:'PFN2026 Annual Conference',date:CONF_DATE});return{ok:true}}
  catch(err){console.error('Email failed:',err);return{ok:false,why:'failed',err}}
}
async function emailBooked(req,rec,slot){
  const r1=await sendMail(rec.email,rec.name,`PFN2026: Meeting confirmed with ${req.name} at ${slot.label}`,`Dear ${rec.name},\n\n${req.name} (${req.company}) has scheduled a 1-on-1 meeting with you.\n\nDate: ${CONF_DATE}\nTime: ${slot.label} (20 minutes)\n\nPlease be at the meeting area at the scheduled time.\n\nBest regards,\nPFN2026 Meeting Scheduler`);
  const r2=await sendMail(req.email,req.name,`PFN2026: Your meeting with ${rec.name} is confirmed`,`Dear ${req.name},\n\nYour 1-on-1 meeting with ${rec.name} (${rec.company}) has been confirmed.\n\nDate: ${CONF_DATE}\nTime: ${slot.label} (20 minutes)\n\nBest regards,\nPFN2026 Meeting Scheduler`);
  return{r1,r2}
}
async function emailCancelled(canceller,other,slot){
  return await sendMail(other.email,other.name,`PFN2026: Meeting with ${canceller.name} at ${slot.label} cancelled`,`Dear ${other.name},\n\nThe meeting with ${canceller.name} (${canceller.company}) at ${slot.label} on ${CONF_DATE} has been cancelled.\n\nYou can schedule a new meeting through the scheduler.\n\nBest regards,\nPFN2026 Meeting Scheduler`)
}

// ── Toasts ────────────────────────────────────────────────────
function toast(type,msg,emailInfo){
  const c=document.getElementById('toast-container'),t=document.createElement('div');t.className='toast '+type;
  t.innerHTML=`<button class="toast-close" onclick="this.parentElement.classList.add('removing');setTimeout(()=>this.parentElement.remove(),300)">✕</button>
    <div class="toast-type">${{confirmed:'✓ Confirmed',cancelled:'✕ Cancelled',error:'⚠ Error',request:'📩 Notification'}[type]||type}</div>
    <div class="toast-message">${esc(msg)}</div>${emailInfo?`<div class="toast-email">${emailInfo}</div>`:''}`;
  c.appendChild(t);setTimeout(()=>{if(t.parentElement){t.classList.add('removing');setTimeout(()=>t.remove(),300)}},7000)
}

// ── Logo ──────────────────────────────────────────────────────
function logo(sz){const w=sz*3.3;return`<svg viewBox="0 0 400 120" width="${w}" height="${sz}" fill="none" xmlns="http://www.w3.org/2000/svg"><g transform="translate(0,5)"><circle cx="55" cy="55" r="50" fill="rgba(255,255,255,0.15)"/><path d="M55 5 C75 5 95 25 95 55 C95 85 75 105 55 105" fill="${ORANGE}"/><ellipse cx="55" cy="55" rx="22" ry="50" fill="none" stroke="white" stroke-width="2.5" opacity="0.35"/><line x1="5" y1="35" x2="105" y2="35" stroke="white" stroke-width="2" opacity="0.3"/><line x1="5" y1="55" x2="105" y2="55" stroke="white" stroke-width="2" opacity="0.3"/><line x1="5" y1="75" x2="105" y2="75" stroke="white" stroke-width="2" opacity="0.3"/><text x="125" y="72" font-family="'Arial Black','Impact',sans-serif" font-size="78" font-weight="900" fill="white" letter-spacing="-2">PFN</text><line x1="125" y1="88" x2="370" y2="88" stroke="white" stroke-width="3" opacity="0.5"/><text x="125" y="107" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="rgba(255,255,255,0.7)" letter-spacing="3.5">PROJECT FREIGHT NETWORK</text></g></svg>`}

// ── Render ────────────────────────────────────────────────────
function render(){
  const a=document.getElementById('app');
  const v={login:vLogin,pin:vPin,register:vRegister,dashboard:vDashboard,schedule:vSchedule,'my-meetings':vMyMeetings,settings:vSettings,'admin-login':vAdminLogin,admin:vAdmin,'admin-add':vAdminAdd,'admin-edit':vAdminEdit};
  a.innerHTML=(v[state.view]||vLogin)();bind()
}
function bind(){
  document.querySelectorAll('[data-action]').forEach(el=>{el.onclick=e=>{e.preventDefault();act(el.dataset.action,el.dataset)}});
  document.querySelectorAll('[data-search]').forEach(el=>{el.oninput=()=>{state.searchQuery=el.value;render();const i=document.querySelector('[data-search]');if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length)}}})
}

function act(a,d){
  switch(a){
    case 'select-for-pin':{
      const m=state.members.find(x=>x.id===d.id);
      if(m){state.pinTarget=m;state.pinInput='';state.view='pin'}break}
    case 'pin-digit':
      if(state.pinInput.length<4){state.pinInput+=d.digit;
        if(state.pinInput.length===4){
          if(state.pinTarget.pin===state.pinInput){state.currentUser=state.pinTarget;state.view='dashboard';state.searchQuery='';state.pinInput='';state.pinTarget=null;saveUser()}
          else{state.pinInput='';setTimeout(()=>{toast('error','Incorrect PIN. Please try again.','');},100)}
        }}break;
    case 'pin-delete':if(state.pinInput.length>0)state.pinInput=state.pinInput.slice(0,-1);break;
    case 'go-register':state.view='register';state.searchQuery='';break;
    case 'go-login':state.view='login';state.searchQuery='';state.pinTarget=null;state.pinInput='';break;
    case 'go-dashboard':state.view='dashboard';state.selectedMember=null;state.searchQuery='';break;
    case 'go-schedule':state.view='schedule';state.selectedMember=null;state.searchQuery='';break;
    case 'go-my-meetings':state.view='my-meetings';state.searchQuery='';break;
    case 'go-settings':state.view='settings';break;
    case 'go-admin-login':state.view='admin-login';break;
    case 'go-admin':state.view='admin';break;
    case 'go-admin-add':state.view='admin-add';break;
    case 'go-admin-edit':state.editMember=state.members.find(x=>x.id===d.id);state.view='admin-edit';break;
    case 'logout':state.currentUser=null;state.view='login';state.selectedMember=null;state.searchQuery='';saveUser();break;
    case 'admin-logout':state.adminAuth=false;state.view='login';break;
    case 'register-submit':doRegister();return;
    case 'admin-login-submit':doAdminLogin();return;
    case 'admin-add-submit':doAdminAdd();return;
    case 'admin-edit-submit':doAdminEdit();return;
    case 'admin-delete':doAdminDelete(d.id);return;
    case 'select-member':state.selectedMember=state.members.find(x=>x.id===d.id)||null;break;
    case 'book-slot':doBook(d.slot);return;
    case 'cancel-meeting':doCancel(d.id);return;
    case 'save-email-config':doSaveEmail();return;
    case 'clear-email-config':state.emailConfig=null;saveEmail();toast('cancelled','Email configuration removed.','');break;
    case 'test-email':doTestEmail();return;
    case 'reset-data':
      if(confirm('Reset ALL data? This removes all members, meetings, and settings.')){
        fetch(API+'?action=reset',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
        localStorage.removeItem('pfn26_user');
        state.members=[];state.meetings=[];state.currentUser=null;state.emailConfig=null;state.view='login';state.adminAuth=false}break;
  }
  render()
}

function doRegister(){
  const n=document.getElementById('reg-name')?.value?.trim(),co=document.getElementById('reg-company')?.value?.trim(),
    ct=document.getElementById('reg-country')?.value?.trim(),em=document.getElementById('reg-email')?.value?.trim(),
    pin=document.getElementById('reg-pin')?.value?.trim();
  if(!n||!co||!ct||!em||!pin)return alert('Please fill in all fields.');
  if(state.members.length>=40)return alert('Registration is full (40/40).');
  if(!em.includes('@')||!em.includes('.'))return alert('Please enter a valid email address.');
  if(!/^\d{4}$/.test(pin))return alert('PIN must be exactly 4 digits.');
  if(state.members.find(m=>m.email.toLowerCase()===em.toLowerCase()))return alert('This email is already registered.');
  const m={id:'m'+Date.now(),name:n,company:co,country:ct,email:em,pin:pin};
  state.members.push(m);state.currentUser=m;state.view='dashboard';
  saveMembers();saveUser();render();
  toast('confirmed',`Welcome to PFN2026, ${n}!`,'📧 Confirmation sent to '+em);
  sendMail(em,n,'Welcome to PFN2026 — Registration Confirmed',`Dear ${n},\n\nYou are registered for PFN2026 1-on-1 meetings.\n\nDate: ${CONF_DATE}\nTime: 10:00 AM – 4:00 PM (lunch 12:30 – 13:15)\n\nYour PIN code: ${pin}\nPlease keep this safe — you'll need it to sign in.\n\nBest regards,\nPFN2026 Meeting Scheduler`)
}

async function doAdminLogin(){
  const pw=document.getElementById('admin-pw')?.value;
  if(!pw)return;
  const hash=await hashPassword(pw);
  if(hash===ADMIN_PASSWORD_HASH){state.adminAuth=true;state.view='admin';render()}
  else{toast('error','Incorrect admin password.','')}
}

function doAdminAdd(){
  const n=document.getElementById('adm-name')?.value?.trim(),co=document.getElementById('adm-company')?.value?.trim(),
    ct=document.getElementById('adm-country')?.value?.trim(),em=document.getElementById('adm-email')?.value?.trim(),
    pin=document.getElementById('adm-pin')?.value?.trim();
  if(!n||!co||!ct||!em||!pin)return alert('Please fill in all fields.');
  if(state.members.length>=40)return alert('Maximum 40 members reached.');
  if(!/^\d{4}$/.test(pin))return alert('PIN must be exactly 4 digits.');
  if(state.members.find(m=>m.email.toLowerCase()===em.toLowerCase()))return alert('This email is already registered.');
  state.members.push({id:'m'+Date.now(),name:n,company:co,country:ct,email:em,pin:pin});
  saveMembers();state.view='admin';render();
  toast('confirmed',`${n} has been added.`,'');
  sendMail(em,n,'PFN2026 — You\'re Registered for 1-on-1 Meetings',`Dear ${n},\n\nYou have been registered for the PFN2026 1-on-1 meetings.\n\nDate: ${CONF_DATE}\nTime: 10:00 AM – 4:00 PM\n\nYour PIN code to sign in: ${pin}\n\nBest regards,\nPFN2026 Meeting Scheduler`)

function doAdminEdit(){
  const m=state.editMember;if(!m)return;
  const n=document.getElementById('adme-name')?.value?.trim(),co=document.getElementById('adme-company')?.value?.trim(),
    ct=document.getElementById('adme-country')?.value?.trim(),em=document.getElementById('adme-email')?.value?.trim(),
    pin=document.getElementById('adme-pin')?.value?.trim();
  if(!n||!co||!ct||!em||!pin)return alert('Please fill in all fields.');
  if(!/^\d{4}$/.test(pin))return alert('PIN must be exactly 4 digits.');
  const idx=state.members.findIndex(x=>x.id===m.id);if(idx<0)return;
  // Update name references in meetings
  state.meetings.forEach(mt=>{
    if(mt.requesterId===m.id){mt.requesterName=n;mt.requesterCompany=co;mt.requesterEmail=em}
    if(mt.receiverId===m.id){mt.receiverName=n;mt.receiverCompany=co;mt.receiverEmail=em}
  });
  state.members[idx]={...state.members[idx],name:n,company:co,country:ct,email:em,pin:pin};
  saveMembers();saveMeetings();state.view='admin';render();
  toast('confirmed',`${n} has been updated.`,'')
}

function doAdminDelete(id){
  const m=state.members.find(x=>x.id===id);if(!m)return;
  if(!confirm(`Remove ${m.name} (${m.company})? Their meetings will also be removed.`))return;
  state.members=state.members.filter(x=>x.id!==id);
  state.meetings=state.meetings.filter(mt=>mt.requesterId!==id&&mt.receiverId!==id);
  saveMembers();saveMeetings();render();
  toast('cancelled',`${m.name} has been removed.`,'')
}

async function doBook(slotStart){
  if(!state.selectedMember||!state.currentUser)return;
  const slot=TIME_SLOTS.find(s=>s.start===slotStart);if(!slot)return;
  const conflict=state.meetings.find(m=>m.slot.start===slot.start&&(m.requesterId===state.currentUser.id||m.receiverId===state.currentUser.id||m.requesterId===state.selectedMember.id||m.receiverId===state.selectedMember.id));
  if(conflict)return alert('This time slot is already booked for one of the participants.');
  state.meetings.push({id:'mtg'+Date.now(),requesterId:state.currentUser.id,receiverId:state.selectedMember.id,requesterName:state.currentUser.name,receiverName:state.selectedMember.name,requesterCompany:state.currentUser.company,receiverCompany:state.selectedMember.company,slot,status:'confirmed',createdAt:new Date().toISOString()});
  saveMeetings();render();
  const res=await emailBooked(state.currentUser,state.selectedMember,slot);
  toast('confirmed',`Meeting with ${state.selectedMember.name} confirmed at ${slot.label}.`,
    res.r1.ok?`✅ Email sent to ${state.selectedMember.email}`:res.r1.why==='not_configured'?'📋 Meeting saved — email notifications pending admin setup':'⚠️ Email failed — notify manually')
}

async function doCancel(id){
  const mtg=state.meetings.find(m=>m.id===id);if(!mtg)return;
  const isReq=mtg.requesterId===state.currentUser.id;
  const on=isReq?mtg.receiverName:mtg.requesterName;
  const other=state.members.find(m=>m.id===(isReq?mtg.receiverId:mtg.requesterId));
  if(!confirm(`Cancel meeting with ${on} at ${mtg.slot.label}?`))return;
  state.meetings=state.meetings.filter(m=>m.id!==id);saveMeetings();render();
  if(other){const r=await emailCancelled(state.currentUser,other,mtg.slot);
    toast('cancelled',`Meeting with ${on} at ${mtg.slot.label} cancelled.`,r.ok?`✅ Email sent to ${other.email}`:r.why==='not_configured'?`⚠️ Notify ${on} manually`:`⚠️ Email failed`)}
}

function doSaveEmail(){
  const s=document.getElementById('ejs-service')?.value?.trim(),t=document.getElementById('ejs-template')?.value?.trim(),p=document.getElementById('ejs-pubkey')?.value?.trim();
  if(!s||!t||!p)return alert('Fill in all three fields.');
  state.emailConfig={serviceId:s,templateId:t,publicKey:p};saveEmail();try{emailjs.init(p)}catch(e){}
  render();toast('confirmed','Email configuration saved!','')
}

async function doTestEmail(){
  if(!state.emailConfig||!state.currentUser)return alert('Configure email and sign in first.');
  const btn=document.getElementById('test-email-btn');if(btn){btn.innerHTML='<span class="spinner"></span> Sending...';btn.disabled=true}

}

      <div style="font-size:13px;color:#888;margin-top:4px">Browse members and book time slots.</div>
      <button class="btn btn-primary" data-action="go-schedule" style="margin-top:18px">Schedule a Meeting</button></div>`:`
    <div style="display:flex;flex-direction:column;gap:10px" class="fade-up fade-up-2">
      ${my.map((m,i)=>{const ir=m.requesterId===u.id;const on=ir?m.receiverName:m.requesterName;const oc=ir?m.receiverCompany:m.requesterCompany;
        const om=state.members.find(x=>x.id===(ir?m.receiverId:m.requesterId));
        return`<div class="meeting-card fade-up" style="animation-delay:${i*.05}s">
          <div class="meeting-time-badge"><div class="meeting-time-start">${m.slot.start}</div><div class="meeting-time-end">to ${m.slot.end}</div></div>
          <div style="flex:1;min-width:0"><div class="meeting-partner">${esc(on)}</div><div class="meeting-partner-company">${esc(oc)}${om?' · '+esc(om.country):''}</div><div class="meeting-status">Confirmed</div></div>
          <button class="btn btn-danger-outline" data-action="cancel-meeting" data-id="${m.id}">Cancel</button></div>`}).join('')}
    </div>
    <div class="card fade-up fade-up-3" style="margin-top:24px">
      <h3 style="font-size:14px;font-weight:700;color:${BLUE};margin-bottom:14px">Full Day Overview</h3>
      <div style="display:flex;flex-direction:column;gap:3px">
        ${TIME_SLOTS.map(slot=>{const mtg=my.find(m=>m.slot.start===slot.start);const ir=mtg?mtg.requesterId===u.id:false;
          const on=mtg?(ir?mtg.receiverName:mtg.requesterName):null;const lunch=slot.start==='13:15';
          return`${lunch?'<div style="padding:7px 12px;background:#fef3c7;border-radius:6px;font-size:11px;color:#92400e;text-align:center;margin:3px 0">🍽 Lunch 12:30 – 13:15</div>':''}
            <div style="display:flex;align-items:center;gap:10px;padding:5px 10px;border-radius:6px;${mtg?'background:rgba(255,69,0,.05)':''}">
              <div style="font-size:11px;font-weight:600;color:${BLUE};min-width:95px;opacity:${mtg?1:.4}">${slot.label}</div>
              <div style="flex:1;height:2px;background:${mtg?ORANGE:'#e5e7eb'};border-radius:1px"></div>
              <div style="font-size:12px;color:${mtg?BLUE:'#ccc'};font-weight:${mtg?600:400};min-width:110px">${mtg?esc(on):'Available'}</div></div>`}).join('')}
      </div>
    </div>`}
  </div>`
}
